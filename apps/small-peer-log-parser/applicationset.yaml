apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: small-peer-log-parser-staging-appset
  namespace: argo
spec:
  generators:
    - list:
        elements:
          - cluster: staging
            namespace: small-peer-log-parser-staging
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      name: small-peer-log-parser-{{.cluster}}
      labels:
        harness.io/envRef: smallpeerlogparserstaging
        harness.io/serviceRef: smallpeerlogparserservice
    spec:
      project: mgmt-dev-usw2-ops-int-clusters
      source:
        repoURL: https://github.com/humzam-ditto/cloud-apps
        targetRevision: main
        path: apps/small-peer-log-parser
        helm:
          valueFiles:
            - values.yaml
            - values-staging.yaml
            - harness-release.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  syncPolicy:
    applicationsSync: create-update
