replicaCount: 1

image:
  repository: quay.io/ditto/recruiting-dashboard
  tag: sha-placeholder
  pullPolicy: Always

imagePullSecrets:
  - name: quay.io-cluster

service:
  type: ClusterIP
  port: 8765

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

probes:
  liveness:
    enabled: true
    httpGet:
      path: /health
    initialDelaySeconds: 10
  readiness:
    enabled: true
    httpGet:
      path: /health
    initialDelaySeconds: 5

# Allows up to 180s (18 × 10s) for the Ashby API fetch to complete before
# liveness/readiness probes kick in.
startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 18
  periodSeconds: 10
  timeoutSeconds: 5

# Injects ASHBY_API_KEY from a manually-created secret. Create once with:
#   kubectl create secret generic ashby-credentials \
#     --namespace recruiting-dashboard-staging \
#     --from-literal=ASHBY_API_KEY=<key>
envFrom:
  - secretRef:
      name: ashby-credentials

configMap:
  enabled: false
  mountPath: ""

serviceAccount:
  create: false
  annotations: {}

env: []
podAnnotations: {}
harnessVersion: "0.0.1"
imageTag: ""

teleport:
  enabled: true
